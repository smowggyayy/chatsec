services:
  chatsec:
    restart: unless-stopped
    container_name: "chatsec"
    build:
      context: .
    env_file:
      - .env
    environment:
      PHX_SERVER: "true"
      PHX_HOST: "chatsec.app"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.chatsec.loadbalancer.server.port=4000"
      - "traefik.http.routers.chatsec.rule=Host(`chatsec.app`)"
      - "traefik.http.routers.chatsec.entrypoints=websecure"
      - "traefik.http.routers.chatsec.tls=true"
      # Rate limiting middleware
      - "traefik.http.middlewares.chatsec-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.chatsec-ratelimit.ratelimit.burst=50"
      - "traefik.http.routers.chatsec.middlewares=chatsec-ratelimit"
    depends_on:
      - reverse-proxy

  reverse-proxy:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
